<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elm XSS Protection Demo</title>
    <!--
        DOMPurify — browser-native DOM-parser-based sanitizer.
        Acts as a second, independent defence layer for the safe-html policy:
        Elm's tokenizer-based allowlist runs first; DOMPurify re-parses the
        already-filtered HTML before it is written to innerHTML.
    -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, sans-serif;
            margin: 0;
            background: #f8f9fa;
        }

        #output-panel {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 24px 24px;
        }

        #output-panel h2 {
            font-size: 1rem;
            font-weight: 700;
            color: #111;
            margin-bottom: 12px;
            border-top: 2px solid #e0e0e0;
            padding-top: 20px;
        }

        .output-row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 12px 14px;
            margin-bottom: 8px;
        }

        .output-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .label-text {
            background: #dc2626;
        }

        .label-html {
            background: #d97706;
        }

        .label-url {
            background: #2563eb;
        }

        .label-pass {
            background: #16a34a;
        }

        .output-value {
            font-family: monospace;
            font-size: 0.85rem;
            color: #333;
            word-break: break-all;
            flex: 1;
        }

        .output-empty {
            color: #aaa;
            font-style: italic;
        }

        #log-entries {
            max-height: 200px;
            overflow-y: auto;
        }

        .log-entry {
            font-size: 0.8rem;
            font-family: monospace;
            color: #555;
            padding: 4px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .log-entry .log-policy {
            font-weight: 700;
            color: #16a34a;
            margin-right: 8px;
        }
    </style>
</head>

<body>

    <div id="elm-app"></div>

    <!--
        Output panel: shows the last value received from each policy.
        Each slot maps to one SecurityPolicy:
          output-text  ← AllowTextOnly  (textContent, safe from HTML injection)
          output-html  ← AllowSafeHtml  (innerHTML,   pre-sanitized by Elm)
          output-link  ← AllowUrl       (href,         scheme already validated)
          log-entries  ← Passthrough    (console + log list, no DOM injection)
    -->
    <div id="output-panel">
        <h2>Port output — last received value per policy</h2>

        <div class="output-row">
            <span class="output-label label-text">text-only</span>
            <span id="output-text" class="output-value output-empty">(nothing sent yet)</span>
        </div>

        <div class="output-row">
            <span class="output-label label-html">safe-html</span>
            <span id="output-html" class="output-value output-empty">(nothing sent yet)</span>
        </div>

        <div class="output-row">
            <span class="output-label label-url">url</span>
            <!--
                We set .href and display the href value as text.
                If Elm blocked the URL, it sends "" — we show a "(blocked)" notice.
            -->
            <span class="output-value">
                <a id="output-link" href="#" style="color:#2563eb;">(nothing sent yet)</a>
            </span>
        </div>

        <div class="output-row" style="flex-direction:column; gap:6px;">
            <span class="output-label label-pass" style="align-self:flex-start;">passthrough</span>
            <div id="log-entries" class="output-value output-empty">(passthrough data appears here and in console)</div>
        </div>
    </div>

    <script src="elm.js"></script>
    <script>
        var app = Elm.Main.init({
            node: document.getElementById('elm-app')
        });

        // Cache DOM references once
        var outputText = document.getElementById('output-text');
        var outputHtml = document.getElementById('output-html');
        var outputLink = document.getElementById('output-link');
        var logEntries = document.getElementById('log-entries');

        app.ports.sendToJS.subscribe(function (message) {
            var policy = message.policy;
            var data = message.data;

            switch (policy) {

                case "text-only":
                    // textContent never interprets HTML — safe even if sanitizer missed something
                    outputText.textContent = data;
                    outputText.classList.remove('output-empty');
                    break;

                case "safe-html":
                    // Elm's tokenizer-based allowlist has already sanitized `data`.
                    // DOMPurify provides a second, DOM-parser-based pass as defence
                    // in depth — it re-parses the already-filtered HTML string using
                    // the browser's own HTML parser before committing to innerHTML.
                    var safeHtml = typeof DOMPurify !== 'undefined'
                        ? DOMPurify.sanitize(data, { USE_PROFILES: { html: true } })
                        : data;
                    outputHtml.innerHTML = safeHtml;
                    outputHtml.classList.remove('output-empty');
                    break;

                case "url":
                    // data is "" when Elm blocked the URL — show a blocked notice instead.
                    if (data === "") {
                        outputLink.removeAttribute('href');
                        outputLink.textContent = "(blocked — dangerous URL scheme)";
                        outputLink.style.color = "#dc2626";
                    } else {
                        outputLink.href = data;
                        outputLink.textContent = data;
                        outputLink.style.color = "#2563eb";
                    }
                    break;

                case "passthrough":
                    // Passthrough data is trusted (e.g. an internal counter).
                    // Log to console and append to the on-screen log list.
                    console.log("[Passthrough]", data);
                    var entry = document.createElement('div');
                    entry.className = 'log-entry';
                    entry.innerHTML =
                        '<span class="log-policy">passthrough</span>' +
                        JSON.stringify(data);
                    // Most-recent first
                    if (logEntries.classList.contains('output-empty')) {
                        logEntries.textContent = '';
                        logEntries.classList.remove('output-empty');
                    }
                    logEntries.insertBefore(entry, logEntries.firstChild);
                    break;

                default:
                    console.warn("[sendToJS] Unknown policy:", policy, data);
            }
        });

        // ── Comparison port ───────────────────────────────────────────────────
        // Elm sends a list of {id, input} records; we run each through DOMPurify
        // with two configs and send the results back via receiveComparison.
        app.ports.requestComparison.subscribe(function (payloads) {
            var results = payloads.map(function (p) {
                return {
                    id: p.id,
                    textOnly: DOMPurify.sanitize(p.input, { ALLOWED_TAGS: [] }),
                    safeHtml: DOMPurify.sanitize(p.input)
                };
            });
            app.ports.receiveComparison.send(results);
        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elm Port Middleware</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        input {
            display: block;
            width: 300px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <div id="elm-app"></div>

    <div id="status-div"></div>

    <script src="elm.js"></script>

    <script>
        var app = Elm.Main.init({
            node: document.getElementById('elm-app')
        });
        var statusDiv = document.querySelector('#status-div');

        if (app.ports.sendTask) {
            app.ports.sendTask.subscribe(function (message) {
                console.log("[i] Received from Elm:", message);

                const taskName = message.taskName;
                const payload = message.payload;

                if (taskName === "saveUsername") {
                    console.log("Username:", payload);
                    statusDiv.innerHTML = "Username: " + payload;
                }
                else if (taskName === "saveCounter") {
                    console.log("Counter:", payload);
                    statusDiv.innerHTML += "<br>Counter: " + payload;
                }
            });
            console.log("✅ Successfully subscribed to sendTask port");
        } else {
            console.error("❌ Port sendTask not found!");
        }
    </script>
</body>

</html>
